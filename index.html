        function renderAuroraLayers() {
            const container = document.getElementById('aurora-layers');
            if (!container) return;
            document.documentElement.style.setProperty('--aurora-intensity', String(visualState.intensity));
            container.innerHTML = visualState.layers.map((layer, index) => `
                <div class="aurora-layer ${layer.animationClass}"
                     style="left:${layer.left}; top:${layer.top}; width:${layer.size}; height:${layer.size}; background:${layer.color}; --layer-opacity:${layer.opacity}; --layer-blur:${layer.blur};"
                     data-layer-index="${index}"></div>
            `).join('');
        }

        function syncRouteMetadata() {
            const hash = window.location.hash;
            if (hash.startsWith(ROUTES.projectPrefix) || hash.startsWith('#project/')) {
                const id = hash.split('/')[1];
                const project = getActiveData().projects.list.find(item => item.id === id);
                updateDocumentTitle(project ? project.title : 'Proje');
                return;
            }
            if (hash === ROUTES.projects || hash === '#projects') { updateDocumentTitle('Projeler'); return; }
            if (hash === ROUTES.about) { updateDocumentTitle('Hakkımda'); return; }
            if (hash === ROUTES.experience) { updateDocumentTitle('Deneyimler'); return; }
            updateDocumentTitle();
        }

        // Navigation Logic
        function navigateTo(viewId, sectionId) {
            toggleMenu(false);
            if (viewId === 'home') {
                let sectionHash = ROUTES.home;
                if (sectionId === 'about') {
                    sectionHash = ROUTES.about;
                } else if (sectionId === 'experience') {
                    sectionHash = ROUTES.experience;
                } else if (sectionId === 'projects') {
                    sectionHash = ROUTES.projects;
                }
                window.location.hash = sectionHash;
            } else if (viewId === 'projects-page') {
                window.location.hash = ROUTES.projects;
            } else {
                showView(viewId);
                if(sectionId) {
                   setTimeout(() => {
                       const el = document.getElementById(sectionId);
                       if(el) el.scrollIntoView({behavior: 'smooth'});
                   }, 100);
                } else {
                   window.scrollTo(0,0);
                }
            }
        }

        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function handleHashChange() {
            const hash = window.location.hash;
            if (hash.startsWith(ROUTES.projectPrefix) || hash.startsWith('#project/')) {
                const id = hash.split('/')[1];
                openProjectDetail(id, false); 
            } else if (hash === ROUTES.projects || hash === '#projects') {
                showView('projects-page-view');
            } else {
                showView('home-view');
                if (hash && hash !== ROUTES.home && hash !== '#home') {
                    const routeToSection = {
                        [ROUTES.about.substring(1)]: 'about',
                        [ROUTES.experience.substring(1)]: 'experience',
                        [ROUTES.projects.substring(1)]: 'projects',
                        home: 'hero'
                    };
                    const id = routeToSection[hash.substring(1)] || hash.substring(1);
                    setTimeout(() => {
                        const el = document.getElementById(id);
                        if(el) el.scrollIntoView({behavior: 'smooth'});
                    }, 100);
                }
            }
            syncRouteMetadata();
        }

                                                 <p class="text-gray-300 text-lg leading-relaxed text-wrap-anywhere">${project.longDescription || project.description}</p>
                       </section>
                       ${featuresHtml}
                    </div>
                    <div class="space-y-6">
                      <div class="bg-white/5 border border-white/10 rounded-2xl p-6 backdrop-blur-sm sticky top-24">
                         <h3 class="text-xl font-bold text-white mb-6 border-b border-white/10 pb-4">${data.projects.labelInfo}</h3>
                         <div class="space-y-4 mb-8">
                           <div class="flex justify-between items-center"><span class="text-gray-400 flex gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg> ${data.projects.labelRole}</span> <span class="text-white">${data.projects.textRole}</span></div>
                           <div class="space-y-3 pt-4">
                             <a href="${project.demoUrl}" target="_blank" class="flex items-center justify-center gap-2 w-full bg-teal-600 hover:bg-teal-500 text-white py-3 rounded-lg font-medium transition-colors">
                                ${data.projects.labelLiveDemo} 
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                             </a>
                                      ${project.githubUrl && project.githubUrl !== '#' ? `
                                      <a href="${project.githubUrl}" target="_blank" class="flex items-center justify-center gap-2 w-full bg-white/10 hover:bg-white/20 text-white py-3 rounded-lg font-medium transition-colors border border-white/10">
                                          ${data.projects.labelGithub} 
                                          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>

                         </div>
                      </div>
                    </div>
                 </div>`;
            showView('project-detail-view');
                syncRouteMetadata();
        }

        let typeWriterTimeout;

        function startTypewriter() {
            clearTimeout(typeWriterTimeout);
            const data = getActiveData();
            const prefix = data.hero.prefix;
            const name = GLOBAL_CONFIG.name + ".";
            const prefixEl = document.getElementById('hero-prefix');
            const nameEl = document.getElementById('hero-name');
            const subEl = document.getElementById('hero-subtitle');

            prefixEl.textContent = '';
            nameEl.textContent = '';
            subEl.style.opacity = '0';
            subEl.innerText = data.hero.subtitle;

            let i = 0;
            function typePrefix() {
                if (i < prefix.length) {
                    prefixEl.textContent += prefix.charAt(i);
                    i++;
                    typeWriterTimeout = setTimeout(typePrefix, 70);
                } else {
                    i = 0;
                    typeWriterTimeout = setTimeout(typeName, 200);
                }
            }

            function typeName() {
                if (i < name.length) {
                    nameEl.textContent += name.charAt(i);
                    i++;
                    typeWriterTimeout = setTimeout(typeName, 100);
                } else {
                    subEl.style.opacity = '1';
                    subEl.style.transform = 'translateY(0)';
                }
            }

            typePrefix();
        }

        let observer;

        function setupObservers() {
            if (observer) {
                observer.disconnect();
            }

            observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.fade-in-section').forEach(el => observer.observe(el));
        }

        const menuBtn = document.getElementById('menu-btn');
        const closeMenuBtn = document.getElementById('close-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileDrawer = document.getElementById('mobile-drawer');
        const mobileBackdrop = document.getElementById('mobile-backdrop');

        function toggleMenu(show) {
            if (show) {
                mobileMenu.classList.remove('pointer-events-none', 'opacity-0');
                mobileDrawer.classList.remove('-translate-x-full');
            } else {
                mobileMenu.classList.add('pointer-events-none', 'opacity-0');
                mobileDrawer.classList.add('-translate-x-full');
            }
        }

        menuBtn.addEventListener('click', () => toggleMenu(true));
        closeMenuBtn.addEventListener('click', () => toggleMenu(false));
        mobileBackdrop.addEventListener('click', () => toggleMenu(false));

        window.addEventListener('DOMContentLoaded', init);

    </script>
